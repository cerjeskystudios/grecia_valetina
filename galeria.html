<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería | Grecia Valentina</title>
  <meta name="description" content="Galería de fotos: vida moto, eventos y lifestyle de Grecia Valentina.">
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<header class="navbar" id="navbar">
  <div class="container">
    <a href="index.html" class="navbar-logo">
      <img class="navbar-logo-img" src="assets/img/logo.jpg" alt="GV" onerror="this.style.display='none'">
      <span class="navbar-logo-text">GRECIA <span>VALENTINA</span></span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Inicio</a><a href="tienda.html">Tienda</a>
      <a href="nosotros.html">Sobre mí</a><a href="galeria.html" class="active">Galería</a><a href="contacto.html">Contacto</a>
    </nav>
    <div class="navbar-actions">
      <a href="carrito.html" class="cart-btn" aria-label="Carrito">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
      <button class="hamburger" id="hamburger" aria-label="Menú" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>
<nav class="nav-mobile" id="navMobile">
  <a href="index.html">Inicio</a><a href="tienda.html">Tienda</a><a href="nosotros.html">Sobre mí</a>
  <a href="galeria.html">Galería</a><a href="contacto.html">Contacto</a>
  <a href="carrito.html" style="color:var(--color-gold)">🛒 Carrito</a>
</nav>

<div class="page-hero">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Inicio</a> › <span>Galería</span></div>
    <h1 class="page-hero-title fade-in">MI <span class="text-gradient">GALERÍA</span></h1>
    <p class="page-hero-subtitle fade-in">Momentos sobre dos ruedas</p>
  </div>
</div>

<main class="section" style="padding-top:1rem;">
  <div class="container">

    <!-- Filtros galería -->
    <div class="filters-bar" id="galleryFilters" style="margin-bottom:2.5rem;">
      <button class="filter-btn active" data-cat="all">Todas</button>
      <button class="filter-btn" data-cat="ruta">🛣️ En Ruta</button>
      <button class="filter-btn" data-cat="eventos">🏁 Eventos</button>
      <button class="filter-btn" data-cat="productos">🧤 Productos</button>
      <button class="filter-btn" data-cat="lifestyle">🌟 Lifestyle</button>
    </div>

    <!-- Grid galería -->
    <div class="gallery-grid" id="galleryGrid">
      <!-- Se genera con JS -->
    </div>

  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lightboxClose" aria-label="Cerrar">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <p class="footer-copy">© <span id="footerYear"></span> Grecia Valentina.</p>
      <p class="footer-dev">Desarrollado por <a href="estudio.html">CerjeskyStudios</a></p>
    </div>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
const GALLERY_ITEMS = [
  { src:'assets/img/gallery/g1.jpg',  cap:'En ruta 🛣️',      cat:'ruta' },
  { src:'assets/img/gallery/g2.jpg',  cap:'Evento moto 🏁',   cat:'eventos' },
  { src:'assets/img/gallery/g3.jpg',  cap:'Look del día ✨',   cat:'lifestyle' },
  { src:'assets/img/gallery/g4.jpg',  cap:'Aventuras 🏕️',    cat:'ruta' },
  { src:'assets/img/gallery/g5.jpg',  cap:'Mis guantes 🧤',   cat:'productos' },
  { src:'assets/img/gallery/g6.jpg',  cap:'Carretera libre 🛣', cat:'ruta' },
  { src:'assets/img/gallery/g7.jpg',  cap:'Concentración 🏁',  cat:'eventos' },
  { src:'assets/img/gallery/g8.jpg',  cap:'Casco nuevo 🪖',   cat:'productos' },
  { src:'assets/img/gallery/g9.jpg',  cap:'Atardecer 🌅',     cat:'lifestyle' },
  { src:'assets/img/gallery/g10.jpg', cap:'Grupo moto 👥',    cat:'eventos' },
  { src:'assets/img/gallery/g11.jpg', cap:'Ciudad de noche 🌃',cat:'lifestyle' },
  { src:'assets/img/gallery/g12.jpg', cap:'Chaqueta nueva 🧥', cat:'productos' },
];

function renderGallery(cat) {
  const filtered = cat === 'all' ? GALLERY_ITEMS : GALLERY_ITEMS.filter(g => g.cat === cat);
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = filtered.map(g => `
    <div class="gallery-item fade-in" data-lightbox="${g.src}">
      <img src="${g.src}" alt="${g.cap}"
        onerror="this.parentElement.style.background='var(--color-surface)';this.style.display='none'">
      <div class="gallery-overlay">
        <span style="color:#fff;font-weight:600;font-size:.9rem;">${g.cap}</span>
      </div>
    </div>`).join('');
  
  requestAnimationFrame(() => {
    grid.querySelectorAll('.fade-in').forEach((el,i) => setTimeout(() => el.classList.add('visible'), i*60));
  });
}

document.addEventListener('DOMContentLoaded', () => {
  renderGallery('all');
  document.getElementById('galleryFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('#galleryFilters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(btn.dataset.cat);
  });
});
</script>
</body>
</html>
